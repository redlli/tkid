<script>
  document.addEventListener("DOMContentLoaded", function() {
    const items = document.querySelectorAll('.mashup-item');
    
    items.forEach(item => {
      item.style.transform = `rotate(0deg) scale(1)`;
    });

    // 10s Random Direction Rotation
    setInterval(() => {
      items.forEach(item => {
        let currentRotation = parseInt(item.getAttribute('data-rotation')) || 0;
        const directions = [90, -90];
        const moveBy = directions[Math.floor(Math.random() * directions.length)];
        
        let newRotation = currentRotation + moveBy;
        item.setAttribute('data-rotation', newRotation);
        
        const lastX = item.getAttribute('data-x') || 0;
        const lastY = item.getAttribute('data-y') || 0;
        updateTransform(item, lastX, lastY, 1);
      });
    }, 10000);

    // Fluid Physics
    document.addEventListener('mousemove', (e) => {
      const mouseX = e.clientX;
      const mouseY = e.clientY;

      items.forEach((item) => {
        const rect = item.getBoundingClientRect();
        const itemX = rect.left + rect.width / 2;
        const itemY = rect.top + rect.height / 2;

        const diffX = mouseX - itemX;
        const diffY = mouseY - itemY;
        const distance = Math.sqrt(diffX * diffX + diffY * diffY);
        
        const radius = 450; 

        if (distance < radius) {
          const force = (radius - distance) / radius;
          const moveX = (diffX / distance) * force * -35; 
          const moveY = (diffY / distance) * force * -35;
          const scale = 1 + (force * 0.06); 

          item.setAttribute('data-x', moveX);
          item.setAttribute('data-y', moveY);
          updateTransform(item, moveX, moveY, scale, true);
        } else {
          item.setAttribute('data-x', 0);
          item.setAttribute('data-y', 0);
          updateTransform(item, 0, 0, 1, false);
        }
      });
    });

    function updateTransform(item, x, y, scale, isHovering) {
      const rotation = item.getAttribute('data-rotation') || 0;
      item.style.transition = isHovering ? 'transform 0.2s ease-out' : 'transform 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
      item.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg) scale(${scale})`;
    }
  });
</script>
