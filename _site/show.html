<script>
let currentIdx = 0;
let currentImgs = [];

document.addEventListener("DOMContentLoaded", function() {
    const items = document.querySelectorAll('.mashup-item');
    const popup = document.getElementById('imagePopup');

    items.forEach(item => {
        item.addEventListener('click', () => {
            openGalleryPopup(
                item.getAttribute('data-imgs').split(','),
                item.getAttribute('data-title'),
                item.getAttribute('data-des'),
                item.getAttribute('data-tee'),
                item.getAttribute('data-thread'),
                item.getAttribute('data-forth') // Added Forthwall attribute
            );
        });
    });

    // Check URL for Search Data
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('title')) {
        openGalleryPopup(
            urlParams.get('imgs').split(','),
            urlParams.get('title'),
            urlParams.get('des'),
            urlParams.get('tee'),
            urlParams.get('thread'),
            urlParams.get('forth') 
            // urlParams.get('name'
        );
    }

    popup.addEventListener('click', closePopup);
});
//Update Function: Update function openGalleryPopup(imgs, title, des, tee, thread, forth, name).
function openGalleryPopup(imgs, title, des, tee, thread, forth) {
    const popup = document.getElementById('imagePopup');
    currentImgs = imgs;
    document.getElementById('pTitle').innerText = title;
    document.getElementById('pDes').innerText = des;
    currentIdx = 0;

    let btns = '';
    // Check and build each button
    if(tee && tee.length > 5) btns += `<a href="${tee}" target="_blank" class="btn">Teepublic</a>`;
    if(thread && thread.length > 5) btns += `<a href="${thread}" target="_blank" class="btn">Threadless</a>`;
    if(forth && forth.length > 5) btns += `<a href="${forth}" target="_blank" class="btn">Forthwall</a>`;
//then add this here to add that name button here
//if(name && name.length > 5) { btns += <a href="${printify}" target="_blank" class="btn">Printify</a>; }
    document.getElementById('pButtons').innerHTML = btns;

    renderImage();
    popup.style.display = 'flex';
    setTimeout(() => popup.classList.add('active'), 10);
    document.body.style.overflow = 'hidden';
}

function renderImage() {
    const mount = document.getElementById('imageMount');
    mount.innerHTML = `<img src="${currentImgs[currentIdx].trim()}" style="animation: fadeIn 0.4s ease;">`;
    document.querySelector('.prev').style.display = currentImgs.length > 1 ? 'flex' : 'none';
    document.querySelector('.next').style.display = currentImgs.length > 1 ? 'flex' : 'none';
}

function changeSlide(n) {
    currentIdx = (currentIdx + n + currentImgs.length) % currentImgs.length;
    renderImage();
}

function closePopup() {
    const popup = document.getElementById('imagePopup');
    popup.classList.remove('active');
    
    // Smooth transition before redirecting
    setTimeout(() => { 
        popup.style.display = 'none';
        document.body.style.overflow = 'auto';
        
        // REDIRECT TO PRODUCT PAGE
        window.location.href = '/product'; 
    }, 300);
}
</script>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const searchInput = document.getElementById('csv-search');
        const resultsDropdown = document.getElementById('search-results');
        let csvData = [];

        // Fetch and parse the CSV
        fetch('/assets/data/pdata.csv')
            .then(response => response.text())
            .then(text => {
                const rows = text.split('\n').slice(1);
                csvData = rows.map(row => {
                    // Regex handles commas inside quotes (like in your tags column)
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    // CSV Order: title(0), img(1), des(2), tee(3), thread(4), forth(5), tag(6)
                    if (cols.length < 7) return null; 

                    return {
                        title: cols[0].replace(/"/g, '').trim(),
                        imgs: cols[1].replace(/"/g, '').trim(),
                        des: cols[2].replace(/"/g, '').trim(),
                        tee: cols[3].replace(/"/g, '').trim(),
                        thread: cols[4].replace(/"/g, '').trim(),
                        forth: cols[5].replace(/"/g, '').trim(), 
                        //incase add new platform name: cols[x].replace(/"/g, '').trim()
                        tags: cols[6].replace(/"/g, '').toLowerCase() // Tags moved to index 6
                    };
                }).filter(item => item !== null);
            });

        function debounce(func, delay) {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        }

        const performSearch = debounce(function() {
            const query = searchInput.value.toLowerCase().trim();
            resultsDropdown.innerHTML = '';
            
            if (query.length < 1) {
                resultsDropdown.style.display = 'none';
                return;
            }

            resultsDropdown.style.display = 'block';
            resultsDropdown.innerHTML = '<div class="search-loader"></div>';

            const filtered = csvData.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.tags.includes(query)
            );

            setTimeout(() => {
                resultsDropdown.innerHTML = '';
                if (filtered.length > 0) {
                    filtered.forEach(item => {
                        const firstImg = item.imgs.split(',')[0].trim();
                        const div = document.createElement('div');
                        div.className = 'result-card';
                        div.innerHTML = `
                            <img src="${firstImg}" alt="${item.title}">
                            <div class="result-info">
                                <span class="result-title">${item.title}</span>
                            </div>
                        `;
                        div.onclick = () => {
                            const params = new URLSearchParams({
                                title: item.title,
                                imgs: item.imgs,
                                des: item.des,
                                tee: item.tee,
                                thread: item.thread,
                                forth: item.forth 
                                // name:item.name to add that new flatform redirect and then do cahnge in /show page
                            });
                            window.open(`/show?${params.toString()}`, '_blank');
                        };
                        resultsDropdown.appendChild(div);
                    });
                } else {
                    resultsDropdown.innerHTML = '<div style="padding:20px;text-align:center;color:black;font-weight:bold;">NO DESIGNS FOUND</div>';
                }
            }, 200); 
        }, 300);

        searchInput.addEventListener('input', performSearch);

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target)) resultsDropdown.style.display = 'none';
        });
    });
    </script>
