<script>
let currentIdx = 0;
let currentImgs = [];

document.addEventListener("DOMContentLoaded", function() {
    // 1. Check URL for Search Parameters
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('title')) {
        openGalleryPopup(
            urlParams.get('imgs').split(','),
            urlParams.get('title'),
            urlParams.get('des'),
            urlParams.get('tee'),
            urlParams.get('thread')
        );
    }

    // 2. Original functionality for on-page items
    const items = document.querySelectorAll('.mashup-item');
    items.forEach(item => {
        item.addEventListener('click', () => {
            openGalleryPopup(
                item.getAttribute('data-imgs').split(','),
                item.getAttribute('data-title'),
                item.getAttribute('data-des'),
                item.getAttribute('data-tee'),
                item.getAttribute('data-thread')
            );
        });
    });

    const popup = document.getElementById('imagePopup');
    popup.addEventListener('click', closePopup);
});

function openGalleryPopup(imgs, title, des, tee, thread) {
    const popup = document.getElementById('imagePopup');
    // Clean up URLs and remove empty spaces
    currentImgs = imgs.map(i => i.trim()).filter(i => i !== "");
    
    document.getElementById('pTitle').innerText = title;
    document.getElementById('pDes').innerText = des;
    currentIdx = 0;

    let btns = '';
    // Check if links exist and aren't just empty/placeholder strings
    if(tee && tee.length > 10) btns += `<a href="${tee}" target="_blank" class="btn">Teepublic</a>`;
    if(thread && thread.length > 10) btns += `<a href="${thread}" target="_blank" class="btn">Threadless</a>`;
    document.getElementById('pButtons').innerHTML = btns;

    renderImage();
    popup.style.display = 'flex';
    setTimeout(() => popup.classList.add('active'), 10);
    document.body.style.overflow = 'hidden';
}

function renderImage() {
    const mount = document.getElementById('imageMount');
    if(currentImgs.length > 0) {
        mount.innerHTML = `<img src="${currentImgs[currentIdx]}" style="animation: fadeIn 0.4s ease;">`;
    }
    
    // Toggle navigation buttons only if more than one image exists
    const prevBtn = document.querySelector('.prev');
    const nextBtn = document.querySelector('.next');
    if (prevBtn && nextBtn) {
        const displayStyle = currentImgs.length > 1 ? 'flex' : 'none';
        prevBtn.style.display = displayStyle;
        nextBtn.style.display = displayStyle;
    }
}

function changeSlide(n) {
    if (currentImgs.length <= 1) return;
    currentIdx = (currentIdx + n + currentImgs.length) % currentImgs.length;
    renderImage();
}

function closePopup() {
    const popup = document.getElementById('imagePopup');
    popup.classList.remove('active');
    setTimeout(() => { 
        popup.style.display = 'none';
        document.body.style.overflow = 'auto';
        // REDIRECT BACK TO HOME PAGE
        window.location.href = "/";
    }, 300);
}
</script>

    <script>
document.addEventListener("DOMContentLoaded", function() {
    const searchInput = document.getElementById('csv-search');
    const resultsDropdown = document.getElementById('search-results');
    let csvData = [];

    // Fetch and parse the CSV
    fetch('/assets/data/pdata.csv')
        .then(response => response.text())
        .then(text => {
            const rows = text.split('\n').slice(1); // Skip header
            csvData = rows.map(row => {
                // Regex to handle commas inside quotes in CSV
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 5) return null;
                return {
                    title: cols[0].replace(/"/g, '').trim(),
                    imgs: cols[1].replace(/"/g, '').trim(),
                    des: cols[2].replace(/"/g, '').trim(),
                    tee: cols[3].replace(/"/g, '').trim(),
                    thread: cols[4].replace(/"/g, '').trim()
                };
            }).filter(item => item !== null);
        });

    searchInput.addEventListener('input', function() {
        const query = this.value.toLowerCase();
        resultsDropdown.innerHTML = '';
        
        if (query.length < 2) {
            resultsDropdown.style.display = 'none';
            return;
        }

        const filtered = csvData.filter(item => item.title.toLowerCase().includes(query));

        if (filtered.length > 0) {
            filtered.forEach(item => {
                const firstImg = item.imgs.split(',')[0].trim();
                const div = document.createElement('div');
                div.className = 'result-card';
                div.innerHTML = `
                    <img src="${firstImg}" alt="${item.title}">
                    <div class="result-info">
                        <span class="result-title">${item.title}</span>
                    </div>
                `;
                div.onclick = () => {
                    // Build the URL with encoded parameters
                    const params = new URLSearchParams({
                        title: item.title,
                        imgs: item.imgs,
                        des: item.des,
                        tee: item.tee,
                        thread: item.thread
                    });
                    window.open(`/show?${params.toString()}`, '_blank');
                };
                resultsDropdown.appendChild(div);
            });
            resultsDropdown.style.display = 'block';
        } else {
            resultsDropdown.style.display = 'none';
        }
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target)) resultsDropdown.style.display = 'none';
    });
});
</script>
